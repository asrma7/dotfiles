"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ÔöÅ](fg:white)\
$os\
$shell\
$username\
$hostname\
$git_branch\
$git_status\
$env_var\
$fill\
$c\
$rust\
$golang\
$dart\
$nodejs\
$php\
$java\
$kotlin\
