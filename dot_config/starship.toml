$line_break\
$character"""

palette = 'matugen'

[os]
disabled = false
style = "fg:on_primary bg:primary"
format = '[ $symbol ]($style)'

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö "
