Macos = "¾░ÇÁ"
Manjaro = "´îÆ "
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ "
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = "´åù "
CentOS = "´îä "
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "´î¬ "

[shell]
disabled = false
style = "fg:on_secondary bg:secondary"
format = '[ ´Æë $indicator ]($style)'

[username]
show_always = true
style_user = "fg:on_tertiary bg:tertiary"
style_root = "fg:on_error bg:error"
format = '[ ´ïÇ $user ]($style)'

[hostname]
ssh_only = false
style = "fg:on_tertiary bg:tertiary"
ssh_symbol = '­ƒîÉ '
format = '[/ $hostname ]($style)'

[directory]
style = "fg:text"
format = '[\[](fg:primary)[ ´ü╗  $path ]($style)[\]](fg:primary)'
truncation_length = 3
truncation_symbol = "ÔÇª/"
use_os_path_sep = false

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Projects" = "¾░▓ï "
"projects" = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "bg:secondary"
format = '[[ $symbol $branch ](fg:on_secondary bg:secondary)]($style)'

[git_status]
style = "bg:secondary"
format = '[[($all_status$ahead_behind )](fg:on_secondary bg:secondary)]($style)'

[env_var]
variable = "AWS_PROFILE"
symbol = '¯×¡'
style = 'bg:tertiary'
format = '[[ $symbol( $env_value )](fg:on_tertiary bg:tertiary)]($style)'

[nodejs]
symbol = "¯£ÿ "
style = "bg:node_green"
format = '[[ $symbol( $version) ](fg:black bg:node_green)]($style)'

[c]
symbol = "¯ÿ× "
style = "bg:c_blue"
format = '[[ $symbol( $version) ](fg:white bg:c_blue)]($style)'

[rust]
symbol = "¯×¿ "
style = "bg:rust_orange"
format = '[[ $symbol( $version) ](fg:black bg:rust_orange)]($style)'

[golang]
symbol = "¯ÿº "
style = "bg:go_cyan"
format = '[[ $symbol( $version) ](fg:black bg:go_cyan)]($style)'

[dart]
symbol = "¯Öî "
style = "bg:dart_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "¯ÿê "
style = "bg:php_purple"
format = '[[ $symbol( $version) ](fg:white bg:php_purple)]($style)'

[java]
symbol = "¯ëû "
style = "bg:java_red"
format = '[[ $symbol( $version) ](fg:white bg:java_red)]($style)'

[kotlin]
symbol = "¯ÿ┤ "
style = "bg:kotlin_purple"
format = '[[ $symbol( $version) ](fg:white bg:kotlin_purple)]($style)'

[haskell]
symbol = "¯ÿƒ "
style = "bg:haskell_purple"
format = '[[ $symbol( $version) ](fg:white bg:haskell_purple)]($style)'

[python]
symbol = "¯ÿå "
style = "bg:python_blue"
format = '[[ $symbol( $version) (${virtualenv}) ](fg:white bg:python_blue)]($style)'

[docker_context]
symbol = "´îê "
style = "bg:docker_blue"
format = '[[ $symbol( $context) ](fg:white bg:docker_blue)]($style)'

[conda]
style = "bg:conda_green"
format = '[[ $symbol( $environment) ](fg:black bg:conda_green)]($style)'

[line_break]
disabled = false

[fill]
symbol = ' '

[jobs]
symbol = '´Çô '
style = 'red'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

[character]
disabled = false
success_symbol = '[´É▓](bold fg:primary)'
error_symbol = '[´É▓](bold fg:error)'
vimcmd_symbol = '[´É┤](bold fg:primary)'
vimcmd_replace_one_symbol = '[´É┤](bold fg:tertiary)'
vimcmd_replace_symbol = '[´É┤](bold fg:tertiary)'
vimcmd_visual_symbol = '[´É┤](bold fg:secondary)'



















